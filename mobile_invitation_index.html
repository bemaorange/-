<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 식사 초대장</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:"Malgun Gothic","맑은 고딕",sans-serif;
background:linear-gradient(180deg,#fffdf8,#faf6ff,#f3f8ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
}
.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:28px;
padding:32px 24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
position:relative;
overflow:hidden;
}
.page{display:none}
.active{display:block}
.icon{font-size:38px;margin-bottom:14px}
h1{font-size:26px;color:#55637d;line-height:1.5;margin-bottom:16px}
p{color:#707b8e;line-height:1.8;font-size:16px}
.note{font-size:12px;color:#a0a8b8;margin-top:12px}
.btnwrap{margin-top:24px;position:relative;height:70px}
.btn{
border:none;border-radius:999px;padding:14px 26px;
font-size:17px;font-weight:bold;cursor:pointer;
}
.yes{background:#dfeaff;color:#4f6790}
.no{background:#ffe3ea;color:#c0657d;position:absolute;left:55%;top:0}
.invite{
background:#fafbff;border:1px solid #edf1ff;border-radius:22px;
padding:24px;margin:18px 0;
}
.date{font-size:30px;color:#55637d;font-weight:bold}
.day{font-size:18px;color:#7a87a0;margin-top:8px}
.star{font-size:28px;margin:12px 0}
.time{font-size:22px;color:#65738d}
.badge{
display:inline-block;background:#ffe9ef;color:#d35c77;
padding:8px 14px;border-radius:999px;margin-top:12px;font-weight:bold;
}
.menu{
width:100%;padding:16px;margin:8px 0;border:none;
border-radius:16px;background:#eef3ff;color:#556b95;
font-size:18px;cursor:pointer;
}
.final{font-size:23px;line-height:1.9;color:#55637d}
</style>
</head>
<body>
<div class="card">

<div id="p1" class="page active">
<div class="icon">💌</div>
<h1>임상바이오융합과 1기의<br>식사 초대장</h1>
<p>교수님께 식사 자리에<br>정중히 초대의 말씀을 드립니다.</p>
<div class="note">※ 학생들의 간절한 마음이 담겨 있습니다.</div>
<div class="btnwrap">
<button class="btn yes" onclick="showPage('p2')">네, 좋습니다</button>
<button class="btn no" id="no1">아니요</button>
</div>
</div>

<div id="p2" class="page">
<div class="icon">📅</div>
<h1>초대 일정</h1>
<div class="invite">
<div class="date">2026.06.19</div>
<div class="day">금요일</div>
<div class="star">⭐</div>
<div class="time">오후 5시</div>
<div class="badge">중요 일정</div>
</div>
<p>해당 일정으로 참석 가능하신가요?</p>
<div class="btnwrap">
<button class="btn yes" onclick="showPage('p3')">참석합니다</button>
<button class="btn no" id="no2">어려울 것 같습니다</button>
</div>
</div>

<div id="p3" class="page">
<div class="icon">🍽️</div>
<h1>희망 메뉴를 골라주세요</h1>
<button class="menu" onclick="finish('🥩 고기')">🥩 고기</button>
<button class="menu" onclick="finish('🍣 초밥')">🍣 초밥</button>
<button class="menu" onclick="finish('🍜 중식')">🍜 중식</button>
<button class="menu" onclick="finish('🍝 양식')">🍝 양식</button>
</div>

<div id="p4" class="page">
<div class="icon">🎉</div>
<h1>참석 확정</h1>
<div class="final" id="result"></div>
<div class="note" style="margin-top:18px">
본 응답은 번복이 어려울 수 있습니다 😆
</div>
</div>

</div>

<script>
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function finish(menu){
document.getElementById('result').innerHTML=
'식사 초대를 수락해 주셔서 감사합니다.<br><br>선택 메뉴<br><b>'+menu+
'</b><br><br>6월 19일에 뵙겠습니다 😊';
showPage('p4');
}

function runner(id){
const btn=document.getElementById(id);
const msgs=[
'교수님, 그러시면 안 됩니다 😭',
'졸업이 걸려 있습니다 🙏',
'다시 생각해 주세요 😊',
'거절 기능이 비활성화되었습니다 😇'
];
btn.addEventListener('mouseenter',()=>{
const parent=btn.parentElement;
const w=parent.clientWidth-120;
const h=50;
btn.style.left=Math.random()*w+'px';
btn.style.top=Math.random()*h+'px';
});
btn.onclick=(e)=>{
e.preventDefault();
alert(msgs[Math.floor(Math.random()*msgs.length)]);
}
}
runner('no1');
runner('no2');
</script>
</body>
</html>
